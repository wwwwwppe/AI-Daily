name: 📦 Package Builds

on:
  workflow_dispatch:

jobs:
  build-windows-exe:
    name: Build Windows 11 x64 .exe
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build one-file executable
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --name ai-daily `
            --add-data "config;config" `
            --add-data "templates;templates" `
            main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-daily-windows-x64-exe
          path: dist/ai-daily.exe
          retention-days: 7

  build-ubuntu-deb:
    name: Build Ubuntu x64 .deb
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux executable
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --onefile \
            --name ai-daily \
            --add-data "config:config" \
            --add-data "templates:templates" \
            main.py

      - name: Build .deb package
        run: |
          VERSION="$(date -u +%Y.%m.%d).${GITHUB_RUN_NUMBER}"
          PKG_ROOT="pkgroot"

          mkdir -p "${PKG_ROOT}/DEBIAN" "${PKG_ROOT}/usr/local/bin" "${PKG_ROOT}/usr/share/doc/ai-daily"
          install -m 0755 dist/ai-daily "${PKG_ROOT}/usr/local/bin/ai-daily"
          cp README.md "${PKG_ROOT}/usr/share/doc/ai-daily/README.md"

          cat > "${PKG_ROOT}/DEBIAN/control" <<EOF
          Package: ai-daily
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: AI Daily Maintainers
          Description: AI Daily newsletter generator packaged as a standalone binary
          EOF

          dpkg-deb --build "${PKG_ROOT}" "ai-daily_${VERSION}_amd64.deb"

      - name: Upload Debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-daily-ubuntu-x64-deb
          path: ai-daily_*_amd64.deb
          retention-days: 7
